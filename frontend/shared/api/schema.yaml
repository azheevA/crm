openapi: 3.0.0
paths:
  /api/auth/sign-up:
    post:
      operationId: AuthController_signUp
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpBodyDto'
      responses:
        '201':
          description: ''
      summary: регистрация
      tags:
        - Auth
  /api/auth/sign-in:
    post:
      operationId: AuthController_signIn
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInBodyDto'
      responses:
        '200':
          description: ''
      summary: авторизация
      tags:
        - Auth
  /api/auth/sign-out:
    post:
      operationId: AuthController_signOut
      parameters: []
      responses:
        '200':
          description: ''
      summary: выход из аккаунта
      tags:
        - Auth
  /api/auth/session:
    get:
      operationId: AuthController_getSessionInfo
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSessionInfoDto'
      summary: инофрмацию о сессии
      tags:
        - Auth
  /api/auth/change-password:
    post:
      operationId: AuthController_changePassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '200':
          description: ''
      summary: изменить пароль профиля
      tags:
        - Auth
  /api/auth/forgot-password:
    post:
      operationId: AuthController_forgotPassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: ''
      summary: функция "забытый пароль"
      tags:
        - Auth
  /api/auth/reset-password-confirm:
    post:
      operationId: AuthController_resetPasswordConfirm
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordConfirmDto'
      responses:
        '200':
          description: ''
      summary: перезапись пароля
      tags:
        - Auth
  /api/users:
    get:
      operationId: UserController_findAll
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDto'
      summary: Получить всех пользователей
      tags:
        - Users
  /api/users/me:
    get:
      operationId: UserController_getMe
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
      security:
        - bearer: []
      summary: Информацию профиля
      tags:
        - Users
    patch:
      operationId: UserController_updateProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileDto'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Обновить свой профиль
      tags:
        - Users
  /api/users/{id}:
    get:
      operationId: UserController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
      summary: Получить одного пользователя
      tags:
        - Users
    patch:
      operationId: UserController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
      summary: Обновить пользователя
      tags:
        - Users
    delete:
      operationId: UserController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
      summary: Удалить пользователя
      tags:
        - Users
  /api/users/upload:
    post:
      operationId: UserController_uploadAvatar
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: ''
      security:
        - bearer: []
      summary: Загрузка аватара пользователя
      tags:
        - Users
  /api/account:
    get:
      operationId: AccountController_getAccount
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDto'
      summary: Добавить доп. информацию профиля
      tags:
        - Account
    patch:
      operationId: AccountController_patchAccount
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchAccountDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchAccountDto'
      summary: Обновить доп. информацию профиля
      tags:
        - Account
  /api/photos/chat:
    post:
      operationId: PhotoController_uploadChatFiles
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              required:
                - files
      responses:
        '201':
          description: ''
      summary: Загрузить файлы для сообщения в чате
      tags:
        - Photos
  /api/photos/{id}:
    delete:
      operationId: PhotoController_removePhoto
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
      summary: Удалить фото
      tags:
        - Photos
  /api/chat/my-chats:
    get:
      operationId: ChatController_getMyChats
      parameters: []
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatResponseDto'
      security:
        - bearer: []
      summary: Список моих чатов
      tags:
        - Chat
  /api/chat/messages:
    get:
      operationId: ChatController_getMessages
      parameters:
        - name: chatId
          required: true
          in: query
          schema:
            type: number
        - name: limit
          required: false
          in: query
          schema:
            type: number
        - name: skip
          required: false
          in: query
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseDto'
      security:
        - bearer: []
      summary: История сообщений чата
      tags:
        - Chat
  /api/activity:
    get:
      operationId: ActivityController_findAll
      parameters:
        - name: dealId
          required: false
          in: query
          schema:
            type: number
        - name: companyId
          required: false
          in: query
          schema:
            type: number
        - name: limit
          required: false
          in: query
          schema:
            type: number
        - name: skip
          required: false
          in: query
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityDto'
      summary: Получить ленту событий
      tags:
        - Activity
  /api/company:
    post:
      operationId: CompanyController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompanyDto'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCompanyDto'
      summary: Добавить информацию о новой компании-клиента
      tags:
        - Company
    get:
      operationId: CompanyController_findAll
      parameters:
        - name: skip
          required: true
          in: query
          schema:
            type: number
        - name: cursor
          required: false
          in: query
          description: ID последней компании с предыдущей страницы
          schema:
            type: number
        - name: limit
          required: false
          in: query
          description: Количество записей
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CreateCompanyDto'
                  nextCursor:
                    type: number
                    nullable: true
      summary: Получить список компаний (курсорная пагинация по ID)
      tags:
        - Company
  /api/company/{id}:
    get:
      operationId: CompanyController_findOne
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCompanyDto'
      summary: Получить компанию по ID
      tags:
        - Company
    patch:
      operationId: CompanyController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCompanyDto'
      responses:
        '200':
          description: ''
      summary: Изменить данные о компании по ID
      tags:
        - Company
    delete:
      operationId: CompanyController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
      tags:
        - Company
  /api/contacts:
    post:
      operationId: ContactController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactDto'
      responses:
        '201':
          description: Контакт успешно создан.
        '400':
          description: Некорректные данные.
      summary: Создать новый контакт
      tags:
        - Contacts
    get:
      operationId: ContactController_findAll
      parameters: []
      responses:
        '200':
          description: Список контактов с вложенными компаниями.
      summary: Получить все контакты
      tags:
        - Contacts
  /api/contacts/{id}:
    get:
      operationId: ContactController_findOne
      parameters:
        - name: id
          required: true
          in: path
          description: Идентификатор контакта
          schema:
            type: number
      responses:
        '200':
          description: Данные контакта найдены.
        '404':
          description: Контакт не найден.
      summary: Получить контакт по ID
      tags:
        - Contacts
    patch:
      operationId: ContactController_update
      parameters:
        - name: id
          required: true
          in: path
          description: ID существующего контакта
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContactDto'
      responses:
        '200':
          description: Контакт успешно обновлен.
        '404':
          description: Контакт с таким ID не найден.
      summary: Обновить данные контакта
      tags:
        - Contacts
    delete:
      operationId: ContactController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: Контакт успешно удален.
      summary: Удалить контакт
      tags:
        - Contacts
  /api/deals:
    post:
      operationId: DealController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealDto'
      responses:
        '201':
          description: ''
      summary: Создать новую сделку
      tags:
        - Deals
    get:
      operationId: DealController_findAll
      parameters: []
      responses:
        '200':
          description: ''
      summary: Список всех сделок
      tags:
        - Deals
  /api/deals/{id}:
    patch:
      operationId: DealController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDealDto'
      responses:
        '200':
          description: ''
      summary: Обновить статус или данные сделки
      tags:
        - Deals
    delete:
      operationId: DealController_delete
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: Сделка успешно удалена.
      summary: Удалить сделку
      tags:
        - Deals
  /api/deals/{id}/upload:
    post:
      operationId: DealController_uploadDealFiles
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '201':
          description: ''
      summary: Загрузить документы к сделке
      tags:
        - Deals
  /api/tasks:
    post:
      description: >-
        Создает задачу и привязывает её к текущему пользователю. Можно
        опционально привязать к сделке.
      operationId: TasksController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskDto'
      responses:
        '201':
          description: Задача успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDto'
      security:
        - bearer: []
      summary: Создать новую задачу
      tags:
        - Tasks
    get:
      description: >-
        Возвращает все задачи текущего пользователя. Можно отфильтровать по
        конкретной сделке.
      operationId: TasksController_findAll
      parameters:
        - name: dealId
          required: false
          in: query
          description: ID сделки для фильтрации задач
          schema:
            type: string
      responses:
        '200':
          description: Список задач получен
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskDto'
      security:
        - bearer: []
      summary: Получить список задач
      tags:
        - Tasks
  /api/tasks/{id}:
    patch:
      description: >-
        Позволяет изменить заголовок, описание, дату дедлайна или статус
        выполнения.
      operationId: TasksController_update
      parameters:
        - name: id
          required: true
          in: path
          description: Индивидуальный ID задачи
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskDto'
      responses:
        '200':
          description: Задача обновлена
        '404':
          description: Задача не найдена
      security:
        - bearer: []
      summary: Обновить данные задачи
      tags:
        - Tasks
    delete:
      description: Безвозвратно удаляет задачу из системы.
      operationId: TasksController_remove
      parameters:
        - name: id
          required: true
          in: path
          description: ID задачи для удаления
          schema:
            type: number
      responses:
        '200':
          description: Задача успешно удалена
      security:
        - bearer: []
      summary: Удалить задачу
      tags:
        - Tasks
  /api/tasks/{id}/toggle:
    patch:
      description: Быстро меняет статус задачи с "выполнено" на "не выполнено" и наоборот.
      operationId: TasksController_toggleStatus
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      summary: Переключить статус выполнения
      tags:
        - Tasks
info:
  title: My Backend
  description: Этот API работает с несколькими сущностями
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  schemas:
    SignUpBodyDto:
      type: object
      properties:
        email:
          type: string
          example: test@test.com
        name:
          type: string
          example: John Doe
        password:
          type: string
          example: '1234567'
      required:
        - email
        - name
        - password
    SignInBodyDto:
      type: object
      properties:
        email:
          type: string
          example: test@test.com
        password:
          type: string
          example: '1234567'
      required:
        - email
        - password
    GetSessionInfoDto:
      type: object
      properties:
        id:
          type: number
        email:
          type: string
        iat:
          type: number
        exp:
          type: number
      required:
        - id
        - email
        - iat
        - exp
    ChangePasswordDto:
      type: object
      properties:
        oldPassword:
          type: string
          example: '1234'
        newPassword:
          type: string
          example: newPassword123
        confirmNewPassword:
          type: string
          example: newPassword123
      required:
        - oldPassword
        - newPassword
        - confirmNewPassword
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          example: test@test.com
      required:
        - email
    ResetPasswordConfirmDto:
      type: object
      properties:
        email:
          type: string
          example: test@test.com
        code:
          type: string
          example: '123456'
        newPassword:
          type: string
          example: newPassword123
      required:
        - email
        - code
        - newPassword
    PhotoDto:
      type: object
      properties:
        id:
          type: number
        url:
          type: string
        filename:
          type: string
      required:
        - id
        - url
        - filename
    UserDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        email:
          type: string
          example: test@test.com
        name:
          type: string
          example: John Doe
        photo:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PhotoDto'
      required:
        - id
        - email
        - photo
    UpdateProfileDto:
      type: object
      properties:
        name:
          type: string
          example: John Doe
    UpdateUserDto:
      type: object
      properties: {}
    AccountDto:
      type: object
      properties:
        id:
          type: number
        ownerId:
          type: number
      required:
        - id
        - ownerId
    PatchAccountDto:
      type: object
      properties: {}
    AvatarDto:
      type: object
      properties:
        url:
          type: string
      required:
        - url
    AuthorDto:
      type: object
      properties:
        id:
          type: number
        name:
          type: string
        avatar:
          $ref: '#/components/schemas/AvatarDto'
      required:
        - id
        - name
    ChatResponseDto:
      type: object
      properties:
        id:
          type: number
        title:
          type: string
        isGroup:
          type: boolean
        members:
          type: array
          items:
            $ref: '#/components/schemas/AuthorDto'
      required:
        - id
        - isGroup
        - members
    MessageDto:
      type: object
      properties:
        id:
          type: number
        text:
          type: string
        createdAt:
          format: date-time
          type: string
        author:
          $ref: '#/components/schemas/AuthorDto'
        chatId:
          type: array
          items:
            type: number
      required:
        - id
        - text
        - createdAt
        - author
        - chatId
    MessageResponseDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MessageDto'
        nextCursor:
          type: number
          nullable: true
      required:
        - data
        - nextCursor
    ActivityUserDto:
      type: object
      properties:
        name:
          type: string
          example: Александр Ажеев
        avatar:
          type: string
          example: https://example.com/avatar.png
      required:
        - name
    ActivityDto:
      type: object
      properties:
        id:
          type: number
          example: 1
        type:
          type: string
          enum:
            - COMMENT
            - STAGE_CHANGE
            - VALUE_CHANGE
            - TASK_CREATED
            - TASK_UPDATED
            - TASK_DELETED
            - FILE_ADDED
            - CHAT_MESSAGE
          example: VALUE_CHANGE
        content:
          type: string
          example: 'Добавлена новая компания: "ООО Вектор"'
        createdAt:
          format: date-time
          type: string
          example: '2026-03-06T10:00:00.000Z'
        user:
          $ref: '#/components/schemas/ActivityUserDto'
        companyId:
          type: number
          example: 123
        dealId:
          type: number
          example: 456
        userId:
          type: number
          example: 1
      required:
        - id
        - type
        - content
        - createdAt
        - user
        - userId
    CreateCompanyDto:
      type: object
      properties:
        name:
          type: string
          example: компания
          description: Название компании
        website:
          type: string
          example: https://company.com
          description: URL этой компании
      required:
        - name
        - website
    UpdateCompanyDto:
      type: object
      properties:
        name:
          type: string
          example: ООО Вектор
          description: Название компании
        website:
          type: string
          example: https://vector.ru
          description: Сайт компании
    CreateContactDto:
      type: object
      properties:
        firstName:
          type: string
          example: Алина
          description: Имя контакта
        lastName:
          type: string
          example: Иванова
          description: Фамилия контакта
        email:
          type: string
          example: ivan@example.com
          description: Email должен быть уникальным
        phone:
          type: string
          example: '+79000000000'
          description: Номер телефона
        companyId:
          type: number
          example: 1
          description: ID компании, к которой привязан контакт
      required:
